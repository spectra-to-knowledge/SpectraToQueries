---
name: External Use
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch: null
permissions: read-all
jobs:
  SpectraToQueries-test:
    name: SpectraToQueries-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Get number of CPU cores
        uses: SimenB/github-actions-cpu-cores@97330871fe1b7d3529392ea000e3d2c4b357e403
        id: cpu-cores
      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e
        with:
          use-public-rspm: true
          Ncpus: ${{ steps.cpu-cores.outputs.count }}
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: >
          sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libcurl4-openssl-dev libfribidi-dev libharfbuzz-dev libuv1-dev \

          && sudo apt-get clean \

          && sudo rm -rf /var/lib/apt/lists/*
      - name: Install
        run: >
          install.packages("SpectraToQueries", repos =
          c("https://spectra-to-knowledge.r-universe.dev",
          "https://bioc.r-universe.dev", "https://cloud.r-project.org"), type =
          "binary")
        shell: Rscript {0}
      - name: Run pipeline
        run: |
          SpectraToQueries::spectra_to_queries()
        shell: Rscript {0}
